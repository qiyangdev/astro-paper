<g class="node" data-id="E" data-label="Event System" data-shape="rectangle">
  <rect x="610.559" y="283.6" width="121.23700000000001" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75"/>
  <text x="671.1775" y="302.05" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Event System</text>
