<g class="node" data-id="R" data-label="useEvent / useEventListener" data-shape="rectangle">
  <rect x="763.7959999999999" y="283.6" width="213.12099999999995" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75"/>
  <text x="870.3564999999999" y="302.05" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">useEvent / useEventListener</text>
</g>
<style data-playground-visual-overrides="">

  .mono {
    font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', ui-monospace, monospace !important;
  }

  .edge,
  .class-relationship,
  .er-relationship,
  .message &gt; line,
  .message &gt; polyline,
  .message &gt; path {
    stroke: var(--_line) !important;
    
    
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .lifeline {
    stroke: var(--_line) !important;
    
    
  }

  .edge[data-style='thick'] {
    
  }

  .node &gt; rect,
  .node &gt; ellipse,
  .node &gt; polygon,
  .node &gt; path,
  .class-node &gt; rect,
  .class-node &gt; .class-header-shape,
  .entity &gt; rect,
  .entity &gt; .entity-header-shape,
  .actor &gt; rect,
  .activation,
  .subgraph &gt; .subgraph-header-shape,
  .subgraph &gt; rect {
    stroke: var(--_node-stroke) !important;
    
    
  }

  .node &gt; line,
  .class-node &gt; line,
  .entity &gt; line {
    stroke: var(--_inner-stroke) !important;
    
    
  }

  
  .subgraph &gt; rect:nth-of-type(1) {
    fill: color-mix(in srgb, var(--fg) 2.5%, var(--bg));
    fill-opacity: 0.96;
  }
  .subgraph &gt; rect:nth-of-type(2), .subgraph &gt; .subgraph-header-shape {
    fill: color-mix(in srgb, var(--fg) 9%, var(--bg));
  }
  .subgraph &gt; text {
    font-weight: 600;
  }</style></svg>