<polyline class="edge" data-from="E" data-to="R" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="731.7959999999999,302.05 763.7959999999999,302.05" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)"/>
