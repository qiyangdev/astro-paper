<polyline class="edge" data-from="P" data-to="W" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="578.559,180.25 594.559,180.25 594.559,180.25 610.559,180.25" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)"/>
<polyline class="edge" data-from="P" data-to="V" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="578.559,180.25 594.559,180.25 594.559,241.14999999999998 610.559,241.14999999999998" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)"/>
